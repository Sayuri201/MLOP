data:
  test_size: 0.2
  random_seed: 42

model:
  num_classes: 7          # Insufficient_Weight, Normal_Weight, Overweight_I/II, Obesity_I/II/III
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  dense_units_1: 256
  dense_units_2: 128
  dense_units_3: 64
  dense_units_4: 32
  dropout_1: 0.3
  dropout_2: 0.2

callbacks:
  early_stopping_patience: 15
  reduce_lr_patience: 5
  reduce_lr_factor: 0.5
  reduce_lr_min_lr: 0.000001

evaluate:
  metrics_path: metrics.json

monitor:
  performance_threshold: 0.05   # retrain if accuracy drops more than 5%
  drift_threshold: 0.05          # KS test p-value threshold for feature drift
